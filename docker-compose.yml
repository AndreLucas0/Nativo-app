services:
  postgres:
    image: postgres:16-alpine
    container_name: nativo-postgres
    environment:
      POSTGRES_DB: nativo_dev
      POSTGRES_USER: nativo
      POSTGRES_PASSWORD: nativo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nativo -d nativo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
