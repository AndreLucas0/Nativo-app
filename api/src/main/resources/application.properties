spring.application.name=nativo-api

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/nativo_dev}
spring.datasource.username=${DB_USER:nativo}
spring.datasource.password=${DB_PASSWORD:nativo}

# HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000

# JPA - nunca usar create/update em prod; Flyway cuida do schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:nativo-changeme-use-env-var-in-prod-min-32-chars!!}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
