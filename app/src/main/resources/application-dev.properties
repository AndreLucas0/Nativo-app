# =============================================
# Dev profile - local development settings
# =============================================

# DataSource - local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nativo_dev
spring.datasource.username=postgres
spring.datasource.password=postgres

# SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.nativo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - hardcoded dev secret (never use in production)
app.jwt.secret=dev-secret-key-change-in-production-minimum-32-chars

# CORS - open for local development
app.cors.allowed-origins=*

# Slow query log - log queries taking longer than 1 second (dev only)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=1000
