# =============================================
# Prod profile - production settings
# All sensitive values read from env vars
# =============================================

# DataSource - read from environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# SQL logging - disabled in production
spring.jpa.show-sql=false

# Logging
logging.level.com.nativo=INFO
logging.level.org.hibernate.SQL=WARN

# JWT - read from environment variable
app.jwt.secret=${JWT_SECRET}

# CORS - restricted to specific origin
app.cors.allowed-origins=${ALLOWED_ORIGINS}
