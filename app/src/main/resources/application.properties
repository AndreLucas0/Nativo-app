spring.application.name=nativo-app
spring.profiles.active=dev

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# HikariCP
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
# Query timeout: 5 seconds (Hibernate-level, applies to all queries)
spring.jpa.properties.jakarta.persistence.query.timeout=5000

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-minimum-32-chars}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
